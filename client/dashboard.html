<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Your attendance dashboard — track every subject and stay above 75%."
    />
    <title>Dashboard — Safe75</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
  </head>

  <body style="visibility: hidden">
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <a href="dashboard.html" class="sidebar-brand">Safe 75</a>
        <nav class="sidebar-nav">
          <a href="dashboard.html" class="sidebar-link active">
            <span class="link-icon">🏠</span> Dashboard
          </a>
          <a href="subjects.html" class="sidebar-link">
            <span class="link-icon">📋</span> Subjects
          </a>
          <a href="holidays.html" class="sidebar-link">
            <span class="link-icon">🏖</span> Holidays
          </a>
          <a href="past-attendance.html" class="sidebar-link">
            <span class="link-icon">📅</span> Mark Past Attendance
          </a>
          <a href="settings.html" class="sidebar-link">
            <span class="link-icon">⚙</span> Semester Timeline
          </a>
          <a href="profile.html" class="sidebar-link" id="sidebarProfileDashboard">
            <span class="link-icon">👤</span> Profile
          </a>
        </nav>
        <div class="sidebar-bottom">
          <div class="sidebar-user">
            Signed in as<br /><strong id="userName"></strong>
          </div>
          <a href="#" id="sidebarLogout" class="sidebar-link">
            <span class="link-icon">🚪</span> Logout
          </a>
          <button class="theme-toggle sidebar-theme" id="sidebarThemeToggleDashboard">
            ☀️
          </button>
        </div>
      </aside>
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- Main Content -->
      <div class="main-content">
        <button class="hamburger" id="hamburgerDashboard">☰</button>

        <div class="main-inner">
          <div class="page-header">
            <h1 id="dashboardGreeting">Welcome back</h1>
            <p>Track your attendance and stay safe.</p>
          </div>

          <div id="semesterHeatmap"></div>

          <div id="setupBanner"></div>
          <div id="holidayBanner"></div>

          <div class="stats-bar" id="statsBar"></div>

          <div id="todaySection"></div>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
