<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Holidays — Safe75</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
  </head>

  <body>
    <nav class="navbar">
      <div class="container">
        <a href="dashboard.html" class="navbar-brand">Safe75</a>
        <div class="navbar-right">
          <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
          <button onclick="logout()" class="btn btn-ghost btn-sm">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="page-header">
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
        <h1>Manage Holidays</h1>
        <p>
          Select dates on the calendar that are holidays. Attendance buttons will
          be disabled on these days.
        </p>
      </div>

      <div class="calendar-wrapper">
        <div class="calendar-card">
          <div class="calendar-nav">
            <button
              class="btn btn-ghost btn-sm"
              id="prevMonth"
              onclick="changeMonth(-1)"
            >
              ←
            </button>
            <h3 id="calendarTitle"></h3>
            <button
              class="btn btn-ghost btn-sm"
              id="nextMonth"
              onclick="changeMonth(1)"
            >
              →
            </button>
          </div>

          <div class="calendar-header">
            <span>Sun</span>
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
          </div>

          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="holiday-sidebar">
          <h3>
            Holidays
            <span class="holiday-count" id="holidayCount">0</span>
          </h3>
          <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 16px">
            Click on any date to toggle it as a holiday.
          </p>
          <div id="holidayList" class="holiday-list"></div>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/holidays.js"></script>
  </body>
</html>
