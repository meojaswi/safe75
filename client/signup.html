<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Create your Safe75 account — Track your college attendance and never fall below 75%." />
  <title>Sign Up — Safe75</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/theme.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <button class="theme-toggle" id="themeToggleSignup"
    style="position: fixed; top: 16px; right: 16px; z-index: 100;">☀️</button>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <h1>Safe75</h1>
        <p>Stay above 75%. Always.</p>
      </div>

      <h2>Create Account</h2>

      <div id="alert" class="alert alert-error"></div>

      <div id="googleSignInButton" class="google-signin-button"></div>

      <div class="auth-divider"><span>or</span></div>

      <form id="signupForm" onsubmit="return handleSignup(event)">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter your password" required />
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary btn-full">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/googleAuth.js"></script>
  <script src="js/signup.js"></script>
</body>

</html>
