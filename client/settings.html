<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings — Safe75</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="container">
        <a href="dashboard.html" class="navbar-brand">Safe75</a>
        <div class="navbar-right">
          <button onclick="logout()" class="btn btn-ghost btn-sm">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="page-header">
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
        <h1>Semester Settings</h1>
        <p>
          Set your semester start and end dates. This helps calculate the total
          expected classes for each subject.
        </p>
      </div>

      <div class="form-card">
        <h2>Semester Dates</h2>

        <div id="alert" class="alert alert-error"></div>

        <form id="semesterForm" onsubmit="return handleSaveSemester(event)">
          <div class="form-group">
            <label for="semesterStart">Semester Start Date</label>
            <input type="date" id="semesterStart" required />
          </div>

          <div class="form-group">
            <label for="semesterEnd">Last Working Day</label>
            <input type="date" id="semesterEnd" required />
          </div>

          <div id="semesterInfo" class="semester-info"></div>

          <button type="submit" id="submitBtn" class="btn btn-primary btn-full">
            Save Semester Dates
          </button>
        </form>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
  </body>
</html>
