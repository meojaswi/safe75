<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings — Safe75</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
  </head>

  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <a href="dashboard.html" class="sidebar-brand">Safe 75</a>
        <nav class="sidebar-nav">
          <a href="dashboard.html" class="sidebar-link">
            <span class="link-icon">🏠</span> Dashboard
          </a>
          <a href="subjects.html" class="sidebar-link">
            <span class="link-icon">📋</span> Subjects
          </a>
          <a href="holidays.html" class="sidebar-link">
            <span class="link-icon">🏖</span> Holidays
          </a>
          <a href="past-attendance.html" class="sidebar-link">
            <span class="link-icon">📅</span> Mark Past Attendance
          </a>
          <a href="settings.html" class="sidebar-link active">
            <span class="link-icon">⚙</span> Settings
          </a>
        </nav>
        <div class="sidebar-bottom">
          <div class="sidebar-user">
            Signed in as<br /><strong id="userName"></strong>
          </div>
          <a
            href="#"
            onclick="
              logout();
              return false;
            "
            class="sidebar-link"
          >
            <span class="link-icon">🚪</span> Logout
          </a>
          <button class="theme-toggle sidebar-theme" onclick="toggleTheme()">
            ☀️
          </button>
        </div>
      </aside>
      <div
        class="sidebar-overlay"
        id="sidebarOverlay"
        onclick="toggleSidebar()"
      ></div>

      <div class="main-content">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>

        <div class="main-inner">
          <div class="page-header">
            <h1>Semester Settings</h1>
            <p>
              Set your semester start and end dates. This helps calculate the
              total expected classes for each subject.
            </p>
          </div>

          <div class="form-card">
            <h2>Semester Dates</h2>

            <div id="alert" class="alert alert-error"></div>

            <form
              id="semesterForm"
              onsubmit="return handleSaveSemester(event);"
            >
              <div class="form-group">
                <label for="semesterStart">Semester Start Date</label>
                <input type="date" id="semesterStart" required />
              </div>

              <div class="form-group">
                <label for="semesterEnd">Last Working Day</label>
                <input type="date" id="semesterEnd" required />
              </div>

              <div id="semesterInfo" class="semester-info"></div>

              <button
                type="submit"
                id="submitBtn"
                class="btn btn-primary btn-full"
              >
                Save Semester Dates
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/settings.js"></script>
  </body>
</html>
