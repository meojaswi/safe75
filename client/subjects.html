<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Subjects — Safe75</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
  </head>

  <body>
    <nav class="navbar">
      <div class="container">
        <a href="dashboard.html" class="navbar-brand">Safe75</a>
        <div class="navbar-right">
          <a href="holidays.html" class="btn btn-holiday-link btn-sm"
            >🏖 Holidays</a
          >
          <a href="settings.html" class="btn btn-ghost btn-sm">⚙ Settings</a>
          <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
          <button onclick="logout()" class="btn btn-ghost btn-sm">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="page-header">
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
        <h1>All Subjects</h1>
        <p>View attendance stats for every subject.</p>
      </div>

      <div class="subjects-grid" id="subjectsGrid">
        <div class="empty-state">
          <div class="loading-spinner" style="width: 32px; height: 32px"></div>
          <p style="margin-top: 16px">Loading subjects...</p>
        </div>
      </div>
    </div>

    <a href="add-subject.html" class="fab" title="Add Subject">+</a>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/subjects.js"></script>
  </body>
</html>
