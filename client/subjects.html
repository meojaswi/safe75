<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Subjects — Safe75</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
  </head>

  <body style="visibility: hidden">
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <a href="dashboard.html" class="sidebar-brand">Safe 75</a>
        <nav class="sidebar-nav">
          <a href="dashboard.html" class="sidebar-link">
            <span class="link-icon">🏠</span> Dashboard
          </a>
          <a href="subjects.html" class="sidebar-link active">
            <span class="link-icon">📋</span> Subjects
          </a>
          <a href="holidays.html" class="sidebar-link">
            <span class="link-icon">🏖</span> Holidays
          </a>
          <a href="past-attendance.html" class="sidebar-link">
            <span class="link-icon">📅</span> Mark Past Attendance
          </a>
          <a href="settings.html" class="sidebar-link">
            <span class="link-icon">⚙</span> Semester Timeline
          </a>
          <a href="profile.html" class="sidebar-link" id="sidebarProfileSubjects">
            <span class="link-icon">👤</span> Profile
          </a>
        </nav>
        <div class="sidebar-bottom">
          <div class="sidebar-user">
            Signed in as<br /><strong id="userName"></strong>
          </div>
          <a href="#" id="sidebarLogoutSubjects" class="sidebar-link">
            <span class="link-icon">🚪</span> Logout
          </a>
          <button class="theme-toggle sidebar-theme" id="sidebarThemeToggleSubjects">
            ☀️
          </button>
        </div>
      </aside>
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <div class="main-content">
        <button class="hamburger" id="hamburgerSubjects">☰</button>

        <div class="main-inner">
          <div class="page-header">
            <h1>All Subjects</h1>
            <p>View attendance stats for every subject.</p>
          </div>

          <div class="action-btns-row">
            <a href="add-subject.html" class="action-btn add">＋ Add Subject</a>
            <button class="action-btn delete" id="openDeletePanelBtnSubjects">
              🗑 Delete Subject
            </button>
          </div>

          <div class="subjects-grid" id="subjectsGrid">
            <div class="empty-state">
              <div
                class="loading-spinner"
                style="width: 32px; height: 32px"
              ></div>
              <p style="margin-top: 16px">Loading subjects...</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/subjects.js"></script>
  </body>
</html>
