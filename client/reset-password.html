<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Set a new Safe75 password."
    />
    <title>Reset Password — Safe75</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
  </head>

  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="logo">
          <h1 class="brand-split">
            <span class="brand-safe">Safe</span><span class="brand-75">75</span>
          </h1>
          <p>Stay above 75%. Always.</p>
        </div>

        <h2>Set New Password</h2>
        <p class="auth-helper">
          Choose a new password for your Safe75 account.
        </p>

        <div id="alert" class="alert alert-error"></div>

        <form id="resetPasswordForm">
          <div class="form-group">
            <label for="password">New Password</label>
            <input
              type="password"
              id="password"
              placeholder="Min 6 characters"
              minlength="6"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <input
              type="password"
              id="confirmPassword"
              placeholder="Re-enter your password"
              minlength="6"
              required
            />
          </div>

          <button type="submit" id="submitBtn" class="btn btn-primary btn-full">
            Reset Password
          </button>
        </form>

        <div class="auth-footer">
          Back to <a href="login.html">Login</a>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/resetPassword.js"></script>
  </body>
</html>
