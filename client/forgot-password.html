<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Reset your Safe75 password by email."
    />
    <title>Forgot Password — Safe75</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
  </head>

  <body>
    <button
      class="theme-toggle"
      id="themeToggleForgot"
      style="position: fixed; top: 16px; right: 16px; z-index: 100;"
    >
      ☀️
    </button>

    <div class="auth-container">
      <div class="auth-card">
        <div class="logo">
          <h1 class="brand-split">
            <span class="brand-safe">Safe</span><span class="brand-75">75</span>
          </h1>
          <p>Stay above 75%. Always.</p>
        </div>

        <h2>Forgot Password</h2>
        <p class="auth-helper">
          Enter your account email and we will send you a reset link.
        </p>

        <div id="alert" class="alert alert-error"></div>

        <form id="forgotPasswordForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <button type="submit" id="submitBtn" class="btn btn-primary btn-full">
            Send Reset Link
          </button>
        </form>

        <div class="auth-footer">
          Remembered your password? <a href="login.html">Login</a>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/forgotPassword.js"></script>
  </body>
</html>
