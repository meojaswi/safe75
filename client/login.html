<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Login to Safe75 — Track your college attendance and never fall below 75%."
    />
    <title>Login — Safe75</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body>
    <button class="theme-toggle" id="themeToggleLogin" style="position: fixed; top: 16px; right: 16px; z-index: 100;">☀️</button>
    <div class="auth-container">
      <div class="auth-card">
        <div class="logo">
          <h1 class="brand-split">
            <span class="brand-safe">Safe</span><span class="brand-75">75</span>
          </h1>
          <p>Stay above 75%. Always.</p>
        </div>

        <h2>Continue With Google</h2>

        <div id="alert" class="alert alert-error"></div>

        <p class="auth-google-note">Use your Google account to access Safe75.</p>
        <div id="googleSignInButton" class="google-signin-button"></div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/googleAuth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
