<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Login to Safe75 — Track your college attendance and never fall below 75%."
    />
    <title>Login — Safe75</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
  </head>

  <body>
    <button class="theme-toggle" onclick="toggleTheme()" style="position: fixed; top: 16px; right: 16px; z-index: 100;">☀️</button>
    <div class="auth-container">
      <div class="auth-card">
        <div class="logo">
          <h1>Safe75</h1>
          <p>Stay above 75%. Always.</p>
        </div>

        <h2>Welcome Back</h2>

        <div id="alert" class="alert alert-error"></div>

        <form id="loginForm" onsubmit="return handleLogin(event)">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <button type="submit" id="submitBtn" class="btn btn-primary btn-full">
            Login
          </button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="index.html">Sign up</a>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
