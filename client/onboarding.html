<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding — Safe75</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
  </head>

  <body class="app-page onboarding-page" style="visibility: hidden">
    <div class="onboarding-shell">
      <header class="onboarding-topbar">
        <a href="dashboard.html" class="sidebar-brand brand-split onboarding-brand">
          <span class="brand-safe">Safe</span><span class="brand-75">75</span>
        </a>
        <div class="onboarding-topbar-right">
          <span class="onboarding-user">
            Signed in as <strong id="onboardingUserName"></strong>
          </span>
          <button
            type="button"
            id="onboardingLogoutBtn"
            class="btn btn-ghost btn-sm"
          >
            Logout
          </button>
        </div>
      </header>

      <main class="onboarding-main">
        <div id="onboardingApp"></div>
      </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/onboarding.js"></script>
  </body>
</html>
